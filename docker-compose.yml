# ============================================
# Study Clash Docker Compose 配置
# 用于生产环境部署，支持 500+ 并发用户
# 数据库：PostgreSQL（生产环境推荐）
# 缓存/消息队列：Redis
# ============================================

services:
  app:
    build: 
      context: .
      labels:
        com.studyclash.version: "1.1.20260509"
        com.studyclash.description: "Study Clash Learning Platform"
        com.studyclash.maintainer: "Study Clash Team"
    image: studyclash-app:1.1.20260509
    container_name: studyclash-app
    restart: unless-stopped
    ports:
      - "80:5002"
    environment:
      - FLASK_ENV=production
      - SECRET_KEY=${SECRET_KEY:-your-secret-key-change-in-production}
      - DATABASE_URL=postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-studyclash_db_password}@db:5432/${POSTGRES_DB:-studyclash}
      - REDIS_URL=redis://redis:6379/0
      - SOCKETIO_MESSAGE_QUEUE=redis://redis:6379/1
      - SOCKETIO_CORS_ALLOWED_ORIGINS=${SOCKETIO_CORS_ALLOWED_ORIGINS:-*}
      - LLM_ENCRYPTION_KEY=${LLM_ENCRYPTION_KEY:-}
      - LOG_DIR=/app/logs
      - LOG_RETENTION_DAYS=${LOG_RETENTION_DAYS:-30}
    volumes:
      # 持久化上传文件
      - uploads_data:/app/uploads
      # 持久化备份文件
      - backups_data:/app/backups
      # 持久化日志文件（使用命名卷避免权限问题）
      - logs_data:/app/logs
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5002/')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - studyclash-network
    deploy:
      resources:
        limits:
          cpus: '4.0'
          memory: 4G
        reservations:
          cpus: '2.0'
          memory: 2G

  db:
    image: postgres:15-alpine
    container_name: studyclash-db
    restart: unless-stopped
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-postgres}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-studyclash_db_password}
      - POSTGRES_DB=${POSTGRES_DB:-studyclash}
      - POSTGRES_MAX_CONNECTIONS=500
    command: >
      postgres
      -c max_connections=500
      -c shared_buffers=512MB
      -c effective_cache_size=1536MB
      -c work_mem=8MB
      -c maintenance_work_mem=128MB
      -c checkpoint_completion_target=0.9
      -c wal_buffers=16MB
      -c default_statistics_target=100
      -c random_page_cost=1.1
      -c effective_io_concurrency=200
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-studyclash}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - studyclash-network
    deploy:
      resources:
        limits:
          cpus: '4.0'
          memory: 4G
        reservations:
          cpus: '2.0'
          memory: 2G

  redis:
    image: redis:7-alpine
    container_name: studyclash-redis
    restart: unless-stopped
    command: >
      redis-server
      --maxmemory 512mb
      --maxmemory-policy allkeys-lru
      --save 900 1
      --save 300 10
      --save 60 10000
      --appendonly yes
      --appendfsync everysec
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - studyclash-network
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 1G
        reservations:
          cpus: '1.0'
          memory: 512M

networks:
  studyclash-network:
    driver: bridge

volumes:
  pgdata:
  uploads_data:
  backups_data:
  logs_data:
  redis_data:
